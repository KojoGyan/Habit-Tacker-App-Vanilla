<section class="modal modal--welcome" aria-hidden="false">
  <div class="modal__backdrop" data-modal-backdrop="true"></div>

  <div class="modal__panel modal__panel--welcome" role="dialog" aria-modal="true" aria-labelledby="welcome-modal-title">
    <div class="modal__header modal__header--centered">
      <button type="button" class="modal__close" data-modal-close aria-label="Close welcome dialog">
        <span aria-hidden="true">×</span>
      </button>

      <div class="modal__headline modal__headline--stacked">
        <div class="modal__icon" aria-hidden="true">🌱</div>
        <h2 id="welcome-modal-title" class="modal__title">Welcome to Sproutly!</h2>
        <p class="modal__subtitle">Let's get to know you better</p>
      </div>
    </div>

    <form class="modal__body modal-form" aria-label="Welcome form placeholder" data-welcome-form>
      <div class="form-field form-field--stacked">
        <label for="userName" class="form-field__label">What's your first name?</label>
        <input id="userName" name="userName" type="text" required placeholder="Your first name" class="form-field__input" />
        <p data-welcome-error class="form-field__error" hidden>Please enter your first name.</p>
      </div>

      <div class="modal__footer dialog-actions">
        <button type="button" class="dialog-actions__button dialog-actions__button--secondary" data-modal-close>Skip</button>
        <button type="submit" class="dialog-actions__button dialog-actions__button--primary">Continue</button>
      </div>
    </form>
  </div>
</section>
