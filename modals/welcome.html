<section class="fixed inset-0 flex items-center justify-center z-50 p-4" aria-hidden="false">
  <div class="modal-backdrop" data-modal-backdrop="true"></div>

  <div
    class="modal-card bg-card rounded-2xl shadow-2xl max-w-md w-full border border-border overflow-hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="welcome-modal-title"
  >
    <div class="p-6 pb-4 border-b border-border relative">
      <button
        type="button"
        class="modal-close absolute top-4 right-4 p-2 text-muted-foreground hover:text-foreground transition-colors rounded-lg hover:bg-secondary/30"
        data-modal-close
        aria-label="Close welcome dialog"
      >
        <span aria-hidden="true">X</span>
      </button>

      <div class="text-center">
        <div class="text-6xl mb-4" aria-hidden="true">🌱</div>
        <h2 id="welcome-modal-title" class="font-display text-2xl mb-2">Welcome to Sproutly!</h2>
        <p class="text-muted-foreground font-body text-sm">Let's get to know you better</p>
      </div>
    </div>

    <form class="p-6" aria-label="Welcome form placeholder" data-welcome-form>
      <div class="mb-6">
        <label for="userName" class="block text-sm font-body mb-2 text-muted-foreground">
          What's your first name?
        </label>
        <input
          id="userName"
          name="userName"
          type="text"
          required
          placeholder="Your first name"
          class="w-full px-4 py-3 bg-input-background dark:bg-input rounded-lg border border-border focus:outline-none focus:ring-2 focus:ring-ring font-body"
        />
        <p data-welcome-error class="text-sm text-danger" hidden>Please enter your first name.</p>
      </div>

      <div class="flex gap-3">
        <button
          type="button"
          class="flex-1 py-3 px-4 rounded-lg font-body text-foreground hover:bg-secondary/30 transition-colors"
          data-modal-close
        >
          Skip
        </button>
        <button
          type="submit"
          class="flex-1 py-3 px-4 rounded-lg font-body bg-accent text-accent-foreground hover:bg-accent/90 transition-colors"
        >
          Continue
        </button>
      </div>
    </form>
  </div>
</section>
