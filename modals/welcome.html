<section class="modal modal--welcome fixed inset-0 flex items-center justify-center z-50 p-4" aria-hidden="false">
  <div class="modal__backdrop modal-backdrop" data-modal-backdrop="true"></div>

  <div
    class="modal__panel modal__panel--sm modal-card bg-card rounded-2xl shadow-2xl max-w-md w-full border border-border overflow-hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="welcome-modal-title"
  >
    <div class="modal__header modal__header--centered p-6 pb-4 border-b border-border relative">
      <button
        type="button"
        class="modal__close modal-close absolute top-4 right-4 p-2 text-muted-foreground hover:text-foreground transition-colors rounded-lg hover:bg-secondary/30"
        data-modal-close
        aria-label="Close welcome dialog"
      >
        <span aria-hidden="true">X</span>
      </button>

      <div class="modal__headline text-center">
        <div class="modal__icon text-6xl mb-4" aria-hidden="true">🌱</div>
        <h2 id="welcome-modal-title" class="modal__title font-display text-2xl mb-2">Welcome to Sproutly!</h2>
        <p class="modal__subtitle text-muted-foreground font-body text-sm">Let's get to know you better</p>
      </div>
    </div>

    <form class="modal__body modal-form p-6" aria-label="Welcome form placeholder" data-welcome-form>
      <div class="form-field form-field--stacked mb-6">
        <label for="userName" class="form-field__label block text-sm font-body mb-2 text-muted-foreground">
          What's your first name?
        </label>
        <input
          id="userName"
          name="userName"
          type="text"
          required
          placeholder="Your first name"
          class="form-field__input w-full px-4 py-3 bg-input-background dark:bg-input rounded-lg border border-border focus:outline-none focus:ring-2 focus:ring-ring font-body"
        />
        <p data-welcome-error class="form-field__error text-sm text-danger" hidden>Please enter your first name.</p>
      </div>

      <div class="modal__footer dialog-actions flex gap-3">
        <button
          type="button"
          class="dialog-actions__button dialog-actions__button--secondary flex-1 py-3 px-4 rounded-lg font-body text-foreground hover:bg-secondary/30 transition-colors"
          data-modal-close
        >
          Skip
        </button>
        <button
          type="submit"
          class="dialog-actions__button dialog-actions__button--primary flex-1 py-3 px-4 rounded-lg font-body bg-accent text-accent-foreground hover:bg-accent/90 transition-colors"
        >
          Continue
        </button>
      </div>
    </form>
  </div>
</section>
