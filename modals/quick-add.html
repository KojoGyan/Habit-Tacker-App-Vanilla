<section class="modal modal--quick-add" aria-hidden="false">
  <div class="modal__backdrop" data-modal-backdrop="true"></div>

  <div class="modal__panel modal__panel--quick-add" role="dialog" aria-modal="true" aria-labelledby="quick-add-title">
    <div class="modal__header modal__header--split">
      <h2 id="quick-add-title" class="modal__title">Add New</h2>
      <button type="button" class="modal__close" data-modal-close aria-label="Close quick add">
        <span aria-hidden="true">×</span>
      </button>
    </div>

    <div class="modal__tabs" role="tablist" aria-label="Quick add tabs">
      <button type="button" role="tab" data-quick-add-tab="habit" aria-selected="true" class="modal__tab">Habit</button>
      <button type="button" role="tab" data-quick-add-tab="todo" aria-selected="false" class="modal__tab">Todo</button>
    </div>

    <form class="modal__body modal-form" aria-label="Quick add placeholder form" data-quick-add-form>
      <div class="form-field">
        <input type="text" name="name" data-quick-add-name-input required placeholder="Name your habit..." class="form-field__input" />
        <p data-quick-add-error class="form-field__error" hidden>Please enter a name.</p>
      </div>

      <div data-quick-add-section="habit" class="form-field form-field--frequency">
        <label class="form-field__label">Frequency</label>
        <div class="segmented-control segmented-control--frequency">
          <button type="button" data-frequency-button="daily" aria-pressed="true" class="segmented-control__button segmented-control__button--frequency">Daily</button>
          <button type="button" data-frequency-button="weekly" aria-pressed="false" class="segmented-control__button segmented-control__button--frequency">Weekly</button>
        </div>
      </div>

      <div data-quick-add-section="todo" class="form-field" hidden>
        <label for="todo-due-date" class="form-field__label">Due Date (Optional)</label>
        <input id="todo-due-date" type="date" name="dueDate" class="form-field__input" />
      </div>

      <div class="modal__footer dialog-actions">
        <button type="button" class="dialog-actions__button dialog-actions__button--secondary" data-modal-close>Cancel</button>
        <button type="submit" class="dialog-actions__button dialog-actions__button--primary">
          <span data-quick-add-submit-label>Add Habit</span>
        </button>
      </div>

      <a href="#page=manage" data-quick-add-manage-link class="modal__link modal__link--manage" data-modal-close>
        <span data-quick-add-manage-link-label>Manage all habits</span>
        <span aria-hidden="true">→</span>
      </a>
    </form>
  </div>
</section>
