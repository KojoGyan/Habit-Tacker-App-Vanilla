<section class="modal modal--stats-preview fixed inset-0 flex items-center justify-center z-50 p-4" aria-hidden="false">
  <div class="modal__backdrop modal-backdrop" data-modal-backdrop="true"></div>

  <div
    class="modal__panel modal__panel--lg modal-card bg-popover rounded-2xl shadow-xl max-w-[680px] w-full max-h-[90vh] overflow-y-auto relative"
    role="dialog"
    aria-modal="true"
    aria-labelledby="stats-preview-title"
  >
    <div class="modal__header modal__header--split flex items-center justify-between p-6 border-b border-border">
      <div class="modal__headline modal__headline--inline flex items-center gap-3">
        <h2 id="stats-preview-title" class="modal__title font-display text-2xl">Your Progress</h2>
        <a href="#page=statistics" class="modal__link text-muted-foreground hover:text-foreground transition-colors" data-modal-close aria-label="Go to full statistics">
          <span aria-hidden="true">↗</span>
        </a>
      </div>

      <button
        type="button"
        class="modal__close modal-close text-muted-foreground hover:text-foreground transition-colors"
        data-modal-close
        aria-label="Close statistics preview"
      >
        <span aria-hidden="true">X</span>
      </button>
    </div>

    <div class="modal__tabs p-6 border-b border-border">
      <div class="segmented-control segmented-control--pill flex gap-2 flex-wrap" role="tablist" aria-label="Time ranges">
        <button type="button" role="tab" data-stats-range="weekly" aria-selected="true" class="segmented-control__button segmented-control__button--pill px-4 py-2 rounded-full font-body text-sm transition-colors capitalize bg-primary text-primary-foreground">Weekly</button>
        <button type="button" role="tab" data-stats-range="monthly" aria-selected="false" class="segmented-control__button segmented-control__button--pill px-4 py-2 rounded-full font-body text-sm transition-colors capitalize bg-secondary/30 text-foreground hover:bg-secondary/50">Monthly</button>
        <button type="button" role="tab" data-stats-range="yearly" aria-selected="false" class="segmented-control__button segmented-control__button--pill px-4 py-2 rounded-full font-body text-sm transition-colors capitalize bg-secondary/30 text-foreground hover:bg-secondary/50">Yearly</button>
        <button type="button" role="tab" data-stats-range="all" aria-selected="false" class="segmented-control__button segmented-control__button--pill px-4 py-2 rounded-full font-body text-sm transition-colors capitalize bg-secondary/30 text-foreground hover:bg-secondary/50">All Time</button>
      </div>
    </div>

    <div class="modal__body p-6 space-y-6">
      <div class="metric-grid metric-grid--three grid grid-cols-3 gap-4" data-stats-modal-summary-grid>
        <article class="card card--metric bg-card border border-border rounded-xl p-4">
          <div class="card__label text-sm text-muted-foreground font-body mb-1">Average Score</div>
          <div class="card__value font-data text-3xl font-bold text-accent">--%</div>
        </article>

        <article class="card card--metric bg-card border border-border rounded-xl p-4">
          <div class="card__label text-sm text-muted-foreground font-body mb-1">Current Streak</div>
          <div class="card__value font-data text-3xl font-bold text-accent">--</div>
          <div class="card__unit text-xs text-muted-foreground font-body">days</div>
        </article>

        <article class="card card--metric bg-card border border-border rounded-xl p-4">
          <div class="card__label text-sm text-muted-foreground font-body mb-1">Best Streak</div>
          <div class="card__value font-data text-3xl font-bold text-accent">--</div>
          <div class="card__unit text-xs text-muted-foreground font-body">days</div>
        </article>
      </div>

      <div class="modal__section modal__section--chart">
        <h3 class="modal__section-title font-display text-lg mb-4" data-stats-performance-title>Performance - Weekly</h3>
        <div class="card card--chart bg-card border border-border rounded-xl p-4" data-stats-modal-chart>
          <p data-stats-chart-copy class="card__body">Chart placeholder region matching the original weekly preview layout.</p>
        </div>
      </div>

      <a href="#page=statistics" class="modal__link flex items-center justify-center gap-2 text-sm text-muted-foreground hover:text-foreground transition-colors font-body" data-modal-close>
        View Full Statistics
        <span aria-hidden="true">↗</span>
      </a>
    </div>
  </div>
</section>
