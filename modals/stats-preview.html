<section class="modal modal--stats-preview" aria-hidden="false">
  <div class="modal__backdrop" data-modal-backdrop="true"></div>

  <div class="modal__panel modal__panel--stats" role="dialog" aria-modal="true" aria-labelledby="stats-preview-title">
    <div class="modal__header modal__header--split">
      <div class="modal__headline modal__headline--inline">
        <h2 id="stats-preview-title" class="modal__title">Your Progress</h2>
        <a href="#page=statistics" class="modal__link modal__link--inline" data-modal-close aria-label="Go to full statistics">
          <img src="./assets/icons/external-link.svg" alt="" aria-hidden="true" class="modal__link-icon" width="12" height="12" />
        </a>
      </div>

      <button type="button" class="modal__close" data-modal-close aria-label="Close statistics preview">
        <span aria-hidden="true">×</span>
      </button>
    </div>

    <div class="modal__tabs modal__tabs--pill" role="tablist" aria-label="Time ranges">
      <button type="button" role="tab" data-stats-range="weekly" aria-selected="true" class="segmented-control__button segmented-control__button--pill">Weekly</button>
      <button type="button" role="tab" data-stats-range="monthly" aria-selected="false" class="segmented-control__button segmented-control__button--pill">Monthly</button>
      <button type="button" role="tab" data-stats-range="yearly" aria-selected="false" class="segmented-control__button segmented-control__button--pill">Yearly</button>
      <button type="button" role="tab" data-stats-range="all" aria-selected="false" class="segmented-control__button segmented-control__button--pill">All Time</button>
    </div>

    <div class="modal__body">
      <div class="metric-grid metric-grid--three" data-stats-modal-summary-grid>
        <article class="card card--metric">
          <div class="card__label">Average Score</div>
          <div class="card__value" data-stats-average-value>64%</div>
        </article>

        <article class="card card--metric">
          <div class="card__label">Current Streak</div>
          <div class="card__value" data-stats-current-streak-value>78</div>
          <div class="card__unit">days</div>
        </article>

        <article class="card card--metric">
          <div class="card__label">Best Streak</div>
          <div class="card__value" data-stats-best-streak-value>121</div>
          <div class="card__unit">days</div>
        </article>
      </div>

      <div class="modal__section modal__section--chart">
        <h3 class="modal__section-title" data-stats-performance-title>Performance - Weekly</h3>
        <div class="card card--chart" data-stats-modal-chart>
          <div class="stats-preview-chart-canvas-wrap" aria-hidden="true">
            <canvas data-stats-modal-chart-canvas></canvas>
          </div>
          <p data-stats-chart-copy class="card__body">Weekly completion trend preview.</p>
        </div>
      </div>

      <a href="#page=statistics" class="modal__link modal__link--centered" data-modal-close>
        View Full Statistics
        <img src="./assets/icons/external-link.svg" alt="" aria-hidden="true" class="modal__link-icon" width="12" height="12" />
      </a>
    </div>
  </div>
</section>
