<section id="manage-view" data-page-view="manage" class="page-view manage-page" aria-labelledby="manage-title">
  <header class="page-header manage-page__header">
    <h1 id="manage-title" class="page-header__title">Manage &amp; Organise</h1>
    <p class="page-header__subtitle">Manage your habits and todos in one place</p>
  </header>

  <section aria-labelledby="manage-mode-title" class="manage-page__mode-section">
    <h2 id="manage-mode-title" class="sr-only">View Mode</h2>
    <div role="tablist" aria-label="Manage modes" class="segmented-control manage-page__mode-tabs" data-manage-mode-tabs>
      <button type="button" role="tab" class="segmented-control__button segmented-control__button--mode" aria-selected="true" data-manage-mode="habits">Habits</button>
      <button type="button" role="tab" class="segmented-control__button segmented-control__button--mode" aria-selected="false" data-manage-mode="todos">Todos</button>
    </div>
  </section>

  <section aria-labelledby="manage-filter-title" class="manage-page__filter-section" data-manage-todo-only hidden>
    <h2 id="manage-filter-title" class="sr-only">Filters and Search</h2>
    <div data-manage-filters role="tablist" class="segmented-control segmented-control--wrap manage-page__filter-tabs" aria-label="Todo filters">
      <button type="button" role="tab" class="segmented-control__button segmented-control__button--filter" aria-selected="true" data-todo-filter="inbox"><img src="./assets/icons/inbox.svg" alt="" aria-hidden="true" class="manage-page__filter-icon" width="16" height="16" />Inbox <span data-filter-count="inbox">(0)</span></button>
      <button type="button" role="tab" class="segmented-control__button segmented-control__button--filter" aria-selected="false" data-todo-filter="all">All <span data-filter-count="all">(0)</span></button>
      <button type="button" role="tab" class="segmented-control__button segmented-control__button--filter" aria-selected="false" data-todo-filter="today"><img src="./assets/icons/calendar.svg" alt="" aria-hidden="true" class="manage-page__filter-icon" width="16" height="16" />Due Today <span data-filter-count="today">(0)</span></button>
      <button type="button" role="tab" class="segmented-control__button segmented-control__button--filter" aria-selected="false" data-todo-filter="upcoming"><img src="./assets/icons/clock.svg" alt="" aria-hidden="true" class="manage-page__filter-icon" width="16" height="16" />Upcoming <span data-filter-count="upcoming">(0)</span></button>
      <button type="button" role="tab" class="segmented-control__button segmented-control__button--filter" aria-selected="false" data-todo-filter="overdue">Overdue <span data-filter-count="overdue">(0)</span></button>
      <button type="button" role="tab" class="segmented-control__button segmented-control__button--filter" aria-selected="false" data-todo-filter="completed"><img src="./assets/icons/check-circle-2.svg" alt="" aria-hidden="true" class="manage-page__filter-icon" width="16" height="16" />Completed <span data-filter-count="completed">(0)</span></button>
    </div>
    <div class="manage-page__toolbar manage-page__toolbar--todo">
      <form data-manage-search-form="todo" class="search-form manage-search-form manage-page__search-form">
        <div class="form-field form-field--search">
          <label for="manage-todo-search" class="form-field__label sr-only">Search Todos</label>
          <img src="./assets/icons/search.svg" alt="" aria-hidden="true" class="manage-page__search-icon" width="20" height="20" />
          <input id="manage-todo-search" name="searchTodos" type="search" class="form-field__input" placeholder="Search todos..." />
        </div>
      </form>
      <button type="button" class="manage-page__new-button" data-open-modal="quick-add" data-quick-add-tab="todo">
        <img src="./assets/icons/plus.svg" alt="" aria-hidden="true" class="manage-page__new-icon" width="20" height="20" />
        New Todo
      </button>
    </div>
    <p data-manage-search-feedback="todo" class="muted-copy search-form__feedback" hidden></p>
  </section>

  <section aria-labelledby="manage-habits-title" class="manage-page__section manage-page__section--habits" data-manage-section="habits">
    <h2 id="manage-habits-title" class="sr-only">Habits</h2>
    <div class="manage-page__toolbar manage-page__toolbar--habit">
      <form data-manage-search-form="habit" class="search-form manage-search-form manage-page__search-form">
        <div class="form-field form-field--search">
          <label for="manage-habit-search" class="form-field__label sr-only">Search Habits</label>
          <img src="./assets/icons/search.svg" alt="" aria-hidden="true" class="manage-page__search-icon" width="20" height="20" />
          <input id="manage-habit-search" name="searchHabits" type="search" class="form-field__input" placeholder="Search habits..." />
        </div>
      </form>
      <button type="button" class="manage-page__new-button" data-open-modal="quick-add" data-quick-add-tab="habit">
        <img src="./assets/icons/plus.svg" alt="" aria-hidden="true" class="manage-page__new-icon" width="20" height="20" />
        New Habit
      </button>
    </div>
    <p data-manage-search-feedback="habit" class="muted-copy search-form__feedback" hidden></p>

    <div class="manage-page__habit-grid" data-manage-habits-list></div>
    <p class="muted-copy" data-manage-habits-empty hidden>No habits match this view yet.</p>
  </section>

  <section aria-labelledby="manage-todos-title" class="manage-page__section manage-page__section--todos" data-manage-section="todos" hidden>
    <h2 id="manage-todos-title" class="sr-only">Todos</h2>
    <div class="manage-page__todo-list" data-manage-todos-list>
      <h3 data-todo-filter-title class="sr-only">Inbox Todos</h3>
      <p data-todo-filter-copy class="sr-only">Todo rows for inbox items will be shown here.</p>
    </div>
    <p class="muted-copy" data-manage-todos-empty hidden>No todos match this view yet.</p>
  </section>
</section>
