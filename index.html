<!doctype html>
<html lang="en" class="theme-light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sproutly - Habit Tracker</title>
  <link rel="stylesheet" href="./styles/core-tokens.css" />
  <link rel="stylesheet" href="./styles/app-shell.css" />
</head>
<body>
  <a href="#page-content" class="skip-link">Skip to main content</a>

  <div id="app-root" data-app-shell class="app-shell">
    <header id="mobile-header" data-shell-mobile-header class="app-mobile-header app-shell__mobile-header" aria-label="Mobile header">
      <div data-logo-group class="app-mobile-header__brand">
        <img src="./assets/brand/LogoWithText.svg" alt="Sproutly" width="83" height="32" />
      </div>
      <button type="button" data-theme-toggle class="app-mobile-header__theme-toggle" aria-label="Toggle theme">
        <img src="./assets/icons/moon.svg" data-theme-icon alt="" aria-hidden="true" width="20" height="20" />
        <span class="sr-only" data-theme-label>Dark Mode</span>
      </button>
    </header>

    <div id="app-shell" tabindex="0" data-shell-wrapper class="app-shell__layout">
      <aside id="app-sidebar" data-shell-sidebar class="app-sidebar app-shell__sidebar" aria-label="Primary navigation">
        <div data-sidebar-brand class="app-sidebar__brand">
          <img src="./assets/brand/Logo.svg" alt="" class="app-sidebar__brand-mark" aria-hidden="true" width="32" height="40" />
          <img src="./assets/brand/LogoWithText.svg" alt="Sproutly" class="app-sidebar__brand-wordmark" width="124" height="34" />
        </div>

        <nav class="app-sidebar__nav" aria-label="App pages">
          <ul class="app-sidebar__nav-list">
            <li class="app-sidebar__nav-item">
              <a href="#page=home" data-nav-page="home" class="app-sidebar__nav-link" aria-current="page" aria-label="Home">
                <img src="./assets/icons/home.svg" alt="" class="app-sidebar__nav-icon" aria-hidden="true" width="20" height="20" />
                <span class="app-sidebar__nav-label" aria-hidden="true">Home</span>
              </a>
            </li>
            <li class="app-sidebar__nav-item">
              <a href="#page=manage" data-nav-page="manage" class="app-sidebar__nav-link" aria-label="Manage habits">
                <img src="./assets/icons/list-checks.svg" alt="" class="app-sidebar__nav-icon" aria-hidden="true" width="20" height="20" />
                <span class="app-sidebar__nav-label" aria-hidden="true">Manage Habits</span>
              </a>
            </li>
            <li class="app-sidebar__nav-item">
              <a href="#page=statistics" data-nav-page="statistics" class="app-sidebar__nav-link" aria-label="Statistics">
                <img src="./assets/icons/bar-chart-3.svg" alt="" class="app-sidebar__nav-icon" aria-hidden="true" width="20" height="20" />
                <span class="app-sidebar__nav-label" aria-hidden="true">Statistics</span>
              </a>
            </li>
          </ul>
        </nav>

        <div data-sidebar-controls class="app-sidebar__controls">
          <div class="app-sidebar__utility-controls" aria-label="Sidebar utility controls">
            <button type="button" class="app-sidebar__info-button" aria-label="Information">
              <img src="./assets/icons/info.svg" alt="" aria-hidden="true" width="16" height="16" />
              <span class="app-sidebar__control-label" aria-hidden="true">Demo Mode</span>
            </button>
            <button type="button" data-theme-toggle class="app-sidebar__theme-toggle" aria-label="Toggle theme">
              <img src="./assets/icons/moon.svg" data-theme-icon alt="" aria-hidden="true" width="20" height="20" />
              <span class="app-sidebar__control-label" data-theme-label aria-hidden="true">Dark Mode</span>
            </button>
            <button type="button" data-sidebar-toggle class="app-sidebar__collapse-toggle" aria-label="Expand sidebar" aria-expanded="false" aria-controls="app-shell">
              <img src="./assets/icons/chevron-right.svg" alt="" aria-hidden="true" width="20" height="20" />
              <span class="app-sidebar__control-label" aria-hidden="true">Collapse</span>
            </button>
          </div>
        </div>
      </aside>

      <div id="page-shell" data-page-shell class="page-shell app-shell__page-shell">
        <main id="page-content" data-page-content class="page-shell__content app-shell__page-content">
          <div id="page-view-mount" data-page-mount class="page-shell__view-mount app-shell__page-mount" data-default-page="home" data-hash-contract="state-map">
            <section id="phase1-placeholder" class="page-shell__placeholder" aria-labelledby="phase1-title">
              <h1 id="phase1-title">Sproutly Shell Ready</h1>
              <p>Page fragments are defined in ./pages and will be injected by hash router JavaScript in phase 2.</p>
              <p>Expected default hash: #page=home</p>
            </section>
          </div>
        </main>
      </div>
    </div>

    <nav id="mobile-nav" data-shell-mobile-nav class="app-mobile-nav app-shell__mobile-nav" aria-label="Mobile app pages">
      <ul class="app-mobile-nav__list">
        <li class="app-mobile-nav__item">
          <a href="#page=home" data-nav-page="home" class="app-mobile-nav__link" aria-current="page" aria-label="Home">
            <img src="./assets/icons/home.svg" alt="" class="app-mobile-nav__icon" aria-hidden="true" width="20" height="20" />
            <span class="app-mobile-nav__label">Home</span>
          </a>
        </li>
        <li class="app-mobile-nav__item">
          <a href="#page=manage" data-nav-page="manage" class="app-mobile-nav__link" aria-label="Manage habits">
            <img src="./assets/icons/list-checks.svg" alt="" class="app-mobile-nav__icon" aria-hidden="true" width="20" height="20" />
            <span class="app-mobile-nav__label">Manage</span>
          </a>
        </li>
        <li class="app-mobile-nav__item">
          <a href="#page=statistics" data-nav-page="statistics" class="app-mobile-nav__link" aria-label="Statistics">
            <img src="./assets/icons/bar-chart-3.svg" alt="" class="app-mobile-nav__icon" aria-hidden="true" width="20" height="20" />
            <span class="app-mobile-nav__label">Stats</span>
          </a>
        </li>
      </ul>
    </nav>

    <div id="modal-root" data-modal-root class="modal-root app-shell__modal-root" aria-live="polite" aria-label="Modal container"></div>
  </div>

  <script src="./assets/vendor/chart.umd.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
