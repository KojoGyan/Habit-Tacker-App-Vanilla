<!doctype html>
<html lang="en" class="theme-light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sproutly - Habit Tracker</title>
  <link rel="stylesheet" href="./styles/core-tokens.css" />
  <link rel="stylesheet" href="./styles/app-shell.css" />
</head>
<body>
  <a href="#page-content" class="skip-link">Skip to main content</a>

  <div id="app-root" data-app-shell>
    <header id="mobile-header" data-shell-mobile-header aria-label="Mobile header">
      <div data-logo-group>
        <img src="./assets/brand/sproutly-logo.svg" alt="Sproutly" width="120" height="32" />
      </div>
      <button type="button" data-theme-toggle aria-label="Toggle theme">Theme</button>
    </header>

    <div id="app-shell" tabindex="0" data-shell-wrapper>
      <aside id="app-sidebar" data-shell-sidebar aria-label="Primary navigation">
        <div data-sidebar-brand>
          <img src="./assets/brand/sproutly-logo.svg" alt="Sproutly logo" width="140" height="40" />
        </div>

        <nav aria-label="App pages">
          <ul>
            <li>
              <a href="#page=home" data-nav-page="home" aria-current="page">Home</a>
            </li>
            <li>
              <a href="#page=manage" data-nav-page="manage">Manage Habits</a>
            </li>
            <li>
              <a href="#page=statistics" data-nav-page="statistics">Statistics</a>
            </li>
          </ul>
        </nav>

        <div data-sidebar-controls>
          <button type="button" data-theme-toggle aria-label="Toggle theme">Theme</button>
        </div>
      </aside>

      <div id="page-shell" data-page-shell>
        <main id="page-content" data-page-content>
          <div id="page-view-mount" data-page-mount data-default-page="home" data-hash-contract="state-map">
            <section id="phase1-placeholder" aria-labelledby="phase1-title">
              <h1 id="phase1-title">Sproutly Shell Ready</h1>
              <p>Page fragments are defined in ./pages and will be injected by hash router JavaScript in phase 2.</p>
              <p>Expected default hash: #page=home</p>
            </section>
          </div>
        </main>
      </div>
    </div>

    <nav id="mobile-nav" data-shell-mobile-nav aria-label="Mobile app pages">
      <ul>
        <li><a href="#page=home" data-nav-page="home" aria-current="page">Home</a></li>
        <li><a href="#page=manage" data-nav-page="manage">Manage</a></li>
        <li><a href="#page=statistics" data-nav-page="statistics">Stats</a></li>
      </ul>
    </nav>

    <div id="modal-root" data-modal-root aria-live="polite" aria-label="Modal container"></div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
